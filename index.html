<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebPiano</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Top controls bar -->
    <div id="controls">
      <div class="logo">
        <span class="logo-icon">♪</span>
        <span class="logo-text">WebPiano</span>
      </div>

      <div class="control-group">
        <button id="btn-import" class="btn btn-accent">
          <span>导入 MIDI</span>
          <input id="file-input" type="file" accept=".mid,.midi" style="display:none">
        </button>
      </div>

      <div class="control-group transport">
        <button id="btn-play" class="btn btn-icon" disabled title="播放 (Space)">
          <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
        </button>
        <button id="btn-stop" class="btn btn-icon" disabled title="停止">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="4" y="4" width="16" height="16" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="control-group slider-group">
        <label>速度</label>
        <input type="range" id="slider-speed" min="25" max="200" value="100" step="5">
        <span id="speed-display">1.0×</span>
      </div>

      <div class="control-group slider-group">
        <label>音量</label>
        <input type="range" id="slider-volume" min="0" max="100" value="75" step="1">
      </div>

      <div id="song-info">
        <span id="song-title">— 未加载 MIDI —</span>
        <span id="song-time"></span>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-track">
      <div id="progress-fill"></div>
      <div id="progress-cursor"></div>
    </div>

    <!-- Main canvas: waterfall + keyboard -->
    <canvas id="main-canvas"></canvas>

    <!-- Keyboard shortcut hint -->
    <div id="kb-hint">键盘演奏: Z–M / Q–U (两个八度) · Space 播放/暂停</div>
  </div>

  <!-- JS files loaded in dependency order -->
  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/midi-parser.js"></script>
  <script src="js/midi-player.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/piano.js"></script>
  <script src="js/waterfall.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
